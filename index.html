<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ঈদ সালামি স্পিন</title>

  <!-- Hind Siliguri Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Hind Siliguri', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, #1f6f43 0%, #0f3f27 35%, #062514 100%);
      color: #fff;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 460px;
      text-align: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 24px;
      padding: 24px 20px 28px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.35);
    }

    .title {
      font-size: 28px;
      line-height: 1.35;
      font-weight: 700;
      color: #fff4c7;
      margin-bottom: 24px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.25);
    }

    .wheel-wrap {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 0 auto 26px;
    }

    .pointer {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 0;
      border-bottom: 34px solid #ffd54a;
      z-index: 10;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 10px solid #ffe08a;
      position: relative;
      overflow: hidden;
      transition: transform 5.8s cubic-bezier(0.17, 0.67, 0.12, 1);
      box-shadow:
        0 8px 20px rgba(0,0,0,0.28),
        inset 0 0 0 6px rgba(255,255,255,0.14);
      background: #ffffff;
    }

    .center-cap {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 62px;
      height: 62px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #ffd54a;
      border: 6px solid #fff4c0;
      z-index: 5;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    button {
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 20px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      padding: 14px 30px;
      background: linear-gradient(135deg, #ffd54a, #ffb300);
      color: #1d2a14;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      min-height: 62px;
      width: 100%;
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 20px;
      font-weight: 600;
      line-height: 1.5;
      color: #fff;
    }

    .note {
      margin-top: 14px;
      font-size: 14px;
      color: #e8f3ea;
      opacity: 0.88;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .wheel-wrap {
        width: 280px;
        height: 280px;
      }

      .title {
        font-size: 24px;
      }

      .result {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">ঈদের চাঁদ আকাশে সালামি নিন বিকাশে</div>

    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheelCanvas" class="wheel" width="320" height="320"></canvas>
      <div class="center-cap"></div>
    </div>

    <div class="controls">
      <button id="spinBtn">স্পিন করুন</button>
      <div class="result" id="resultBox">আপনার ভাগ্য পরীক্ষা করতে স্পিন করুন</div>
    </div>

    <div class="note">
      প্রতি ডিভাইস/ব্রাউজার থেকে একবারই স্পিন করা যাবে।
    </div>
  </div>

  <script>
    const displayNumbers = [2, 3, 4, 5, 8, 10, 15, 20, 25, 30, 50, 100, 1000];
,
    // আসলে শুধু এইগুলোর মধ্যেই থামবে
    const winningNumbers = [2, 3, 5, 8];

    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    const resultBox = document.getElementById("resultBox");

    const totalSlices = displayNumbers.length;
    const arc = (Math.PI * 2) / totalSlices;
    let currentRotation = 0;
    let isSpinning = false;

    function drawWheel() {
      const size = canvas.width;
      const center = size / 2;
      const radius = center - 4;

      ctx.clearRect(0, 0, size, size);

      for (let i = 0; i < totalSlices; i++) {
        const startAngle = i * arc - Math.PI / 2;
        const endAngle = startAngle + arc;

        // alternating colors
        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, startAngle, endAngle);
        ctx.closePath();

        ctx.fillStyle = i % 2 === 0 ? "#1faa59" : "#157347";
        ctx.fill();

        ctx.strokeStyle = "#f7e7a1";
        ctx.lineWidth = 2;
        ctx.stroke();

        // Text
        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(startAngle + arc / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#ffffff";
        ctx.font = "700 22px 'Hind Siliguri', sans-serif";
        ctx.fillText(displayNumbers[i], radius - 18, 8);
        ctx.restore();
      }
    }

    drawWheel();

    function getSliceIndexByNumber(number) {
      return displayNumbers.indexOf(number);
    }

    function markAsUsed(number) {
      localStorage.setItem("eid_spin_done", "yes");
      localStorage.setItem("eid_spin_result", number);
    }

    function alreadyUsed() {
      return localStorage.getItem("eid_spin_done") === "yes";
    }

    function getSavedResult() {
      return localStorage.getItem("eid_spin_result");
    }

    // আগেই যদি স্পিন করা থাকে
    if (alreadyUsed()) {
      const saved = getSavedResult();
      spinBtn.disabled = true;
      resultBox.innerHTML = `এই ডিভাইস থেকে ইতোমধ্যে স্পিন করা হয়েছে।<br>আপনার নাম্বার: <strong>${saved}</strong>`;
    }

    spinBtn.addEventListener("click", () => {
      if (alreadyUsed() || isSpinning) return;

      isSpinning = true;
      spinBtn.disabled = true;
      resultBox.textContent = "স্পিন চলছে...";

      // Random দেখাবে, কিন্তু allowed set এর মধ্যেই থামবে
      const selectedNumber = winningNumbers[Math.floor(Math.random() * winningNumbers.length)];
      const targetIndex = getSliceIndexByNumber(selectedNumber);

      // pointer top এ আছে, তাই slice center সেখানে আনতে rotation হিসাব
      const sliceCenterDeg = (targetIndex * (360 / totalSlices)) + (360 / totalSlices) / 2;
      const targetDeg = 360 - sliceCenterDeg;

      // extra full spins, যাতে বোঝা না যায়
      const extraSpins = 360 * (6 + Math.floor(Math.random() * 3)); // 6 to 8 spins
      const randomOffset = (Math.random() * 12) - 6; // little human-like variation

      currentRotation += extraSpins + targetDeg + randomOffset;

      canvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        resultBox.innerHTML = `অভিনন্দন! আপনার নাম্বার: <strong>${selectedNumber}</strong>`;
        markAsUsed(selectedNumber);
        isSpinning = false;
      }, 5900);
    });
  </script>
</body>
</html>
