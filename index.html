<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spin & Win</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  text-align:center;
  font-family:'Hind Siliguri', sans-serif;
  background: radial-gradient(circle, #ffcc00, #ff6600);
  color:#fff;
}

h1{
  margin-top:20px;
  font-size:22px;
}

/* pointer */
.pointer {
  width:0;
  height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:30px solid #fff;
  margin:auto;
}

/* wheel */
#wheel {
  width:300px;
  height:300px;
  margin:20px auto;
  border-radius:50%;
  border:8px solid white;
  position:relative;
  transition:transform 4s cubic-bezier(.17,.67,.83,.67);
}

/* numbers */
.number {
  position:absolute;
  width:100%;
  height:100%;
}

.number span {
  position:absolute;
  left:50%;
  top:10%;
  transform-origin:0 120px;
  font-weight:bold;
  color:#000;
}

/* button */
button{
  margin-top:20px;
  padding:15px 40px;
  font-size:18px;
  border:none;
  border-radius:50px;
  background:#00c853;
  color:white;
  cursor:pointer;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

button:disabled{
  background:gray;
}

/* result */
#result{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>ঈদের চাঁদ আকাশে সালামি নিন বিকাশে</h1>

<div class="pointer"></div>
<div id="wheel"></div>

<button id="spinBtn">🎯 Spin Now</button>

<div id="result"></div>

<script>
const numbers=[2,3,4,5,8,10,15,20,25,30,50,100];
const fixed=[2,3,5,8];

const wheel=document.getElementById("wheel");

/* background wheel */
wheel.style.background = `conic-gradient(
#fff 0deg 30deg,
#ffd700 30deg 60deg,
#fff 60deg 90deg,
#ffd700 90deg 120deg,
#fff 120deg 150deg,
#ffd700 150deg 180deg,
#fff 180deg 210deg,
#ffd700 210deg 240deg,
#fff 240deg 270deg,
#ffd700 270deg 300deg,
#fff 300deg 330deg,
#ffd700 330deg 360deg
)`;

/* numbers */
numbers.forEach((num,i)=>{
  let div=document.createElement("div");
  div.className="number";

  let span=document.createElement("span");
  span.innerText=num;

  let angle=(360/numbers.length)*i;
  span.style.transform=`rotate(${angle}deg)`;

  div.appendChild(span);
  wheel.appendChild(div);
});

/* one time spin */
if(localStorage.getItem("played")){
  document.getElementById("spinBtn").disabled=true;
  document.getElementById("result").innerText="আপনি ইতিমধ্যে স্পিন করেছেন!";
}

document.getElementById("spinBtn").onclick=function(){

  let result=fixed[Math.floor(Math.random()*fixed.length)];
  let index=numbers.indexOf(result);

  let rotate=360*6+(360-index*(360/numbers.length));

  wheel.style.transform=`rotate(${rotate}deg)`;

  setTimeout(()=>{
    document.getElementById("result").innerText="🎉 আপনি পেয়েছেন: "+result;
  },4000);

  localStorage.setItem("played",true);
  this.disabled=true;
};
</script>

</body>
</html>
