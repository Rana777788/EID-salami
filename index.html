<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ঈদের সালামি স্পিন</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:"Hind Siliguri",sans-serif;
      min-height:100vh;
      background:linear-gradient(135deg,#0f5132,#14532d,#064e3b);
      display:flex;align-items:center;justify-content:center;
      padding:20px;color:#fff;
    }
    .container{
      width:100%;max-width:560px;text-align:center;
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.15);
      border-radius:24px;padding:24px 18px 30px;
      box-shadow:0 20px 50px rgba(0,0,0,.28)
    }
    h1{
      font-size:30px;line-height:1.3;font-weight:700;
      color:#fff8dc;margin-bottom:25px;
      text-shadow:0 3px 8px rgba(0,0,0,.25)
    }
    .wheel-wrap{position:relative;width:360px;height:360px;margin:0 auto 24px}
    .pointer{
      position:absolute;top:-6px;left:50%;transform:translateX(-50%);
      width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;
      border-bottom:32px solid #ffd700;z-index:10;filter:drop-shadow(0 5px 8px rgba(0,0,0,.35))
    }
    canvas{
      width:100%;height:100%;border-radius:50%;background:#fff;
      box-shadow:0 10px 35px rgba(0,0,0,.3)
    }
    .center-dot{
      position:absolute;inset:50%;transform:translate(-50%,-50%);
      width:68px;height:68px;border-radius:50%;
      background:radial-gradient(circle,#fff8dc,#f59e0b);
      border:5px solid #fff;box-shadow:0 4px 15px rgba(0,0,0,.25);z-index:5
    }
    button{
      border:none;outline:none;background:linear-gradient(135deg,#ffd700,#f59e0b);
      color:#1f2937;font-family:"Hind Siliguri",sans-serif;font-size:22px;font-weight:700;
      padding:14px 34px;border-radius:999px;cursor:pointer;
      box-shadow:0 10px 20px rgba(0,0,0,.22);transition:transform .2s ease,opacity .2s ease
    }
    button:hover{transform:translateY(-2px)}
    button:disabled{opacity:.7;cursor:not-allowed;transform:none}
    .result{margin-top:22px;font-size:26px;font-weight:700;color:#fff8dc;min-height:42px}
    @media (max-width:480px){
      h1{font-size:24px}.wheel-wrap{width:300px;height:300px}button{font-size:20px;padding:12px 28px}.result{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ঈদের চাঁদ আকাশে সালামি নিন বিকাশে</h1>
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheel" width="360" height="360"></canvas>
      <div class="center-dot"></div>
    </div>
    <button id="spinBtn">Spin করুন</button>
    <div class="result" id="result">নাম্বার পেতে স্পিন করুন</div>
  </div>

  <script>
    const numbers = [2, 3, 4, 5, 8, 10, 15, 20, 25, 30, 50];
    const allowedStops = [2, 3, 15];

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const result = document.getElementById('result');

    const size = canvas.width;
    const center = size / 2;
    const radius = center - 10;
    const arc = (2 * Math.PI) / numbers.length;

    let currentRotation = 0;
    let spinning = false;

    const colors = ['#facc15','#fb7185','#60a5fa','#34d399','#f97316','#a78bfa','#f43f5e','#22c55e','#38bdf8','#f59e0b','#14b8a6'];

    function drawWheel(rotation = 0) {
      ctx.clearRect(0, 0, size, size);
      for (let i = 0; i < numbers.length; i++) {
        const startAngle = i * arc + rotation - Math.PI / 2;
        const endAngle = startAngle + arc;

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();

        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(startAngle + arc / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.font = "700 24px 'Hind Siliguri', sans-serif";
        ctx.fillText(numbers[i], radius - 18, 8);
        ctx.restore();
      }
    }

    function getIndex(num) {
      return numbers.indexOf(num);
    }

    function spinToTarget(targetNumber) {
      const index = getIndex(targetNumber);
      const sliceCenter = index * arc + arc / 2;
      let targetRotation = (2 * Math.PI) - sliceCenter;
      targetRotation = (targetRotation % (2 * Math.PI) + (2 * Math.PI)) % (2 * Math.PI);

      const extraSpins = 5 + Math.random() * 3;
      let finalRotation = currentRotation + extraSpins * 2 * Math.PI;
      const randomOffset = (Math.random() - 0.5) * 0.3;

      finalRotation += (
        targetRotation - (finalRotation % (2 * Math.PI)) + randomOffset + 2 * Math.PI
      ) % (2 * Math.PI);

      animateSpin(finalRotation, targetNumber);
    }

    function animateSpin(finalRotation, landedNumber) {
      const start = currentRotation;
      const duration = 4500 + Math.random() * 1000;
      const startTime = performance.now();

      function easeOut(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function frame(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = easeOut(progress);
        currentRotation = start + (finalRotation - start) * eased;

        if (progress > 0.9) {
          currentRotation += Math.sin(progress * 50) * 0.01;
        }

        drawWheel(currentRotation);

        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          spinning = false;
          spinBtn.disabled = false;
          result.textContent = `আপনার নাম্বার: ${landedNumber}`;
        }
      }

      requestAnimationFrame(frame);
    }

    spinBtn.addEventListener('click', () => {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      result.textContent = 'স্পিন হচ্ছে...';

      const rand = Math.random();
      let target;
      if (rand < 0.4) target = 2;
      else if (rand < 0.7) target = 3;
      else target = 15;

      spinToTarget(target);
    });

    drawWheel();
  </script>
</body>
</html>
